{% load static %}
<!DOCTYPE html>
<html>
<head>
    <title>Shop</title>
    <link rel="stylesheet" href="{% static 'store/css/base.css' %}">
    <link rel="stylesheet" href="{% static 'store/css/filters.css' %}">
    <link rel="stylesheet" href="{% static 'store/css/products.css' %}">
    <link rel="stylesheet" href="{% static 'store/css/pagination.css' %}">
    <link rel="stylesheet" href="{% static 'store/css/cart.css' %}">
    <link rel="stylesheet" href="{% static 'store/css/auth.css' %}">
</head>
<body>
    <nav class="navbar">
        <a href="{% url 'product_list' %}" class="navbar-brand">Shop</a>

        <div class="navbar-auth">
            {% if request.user.is_authenticated %}
                <a href="{% url 'favorites_list' %}" class="nav-link nav-icon fav-link" title="Обране">
                    <svg width="22" height="22" viewBox="0 0 24 24" fill="none"
                         stroke="currentColor" stroke-width="1.8"
                         stroke-linecap="round" stroke-linejoin="round">
                        <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06
                                 a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78
                                 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/>
                    </svg>
                    <span id="fav-count" class="cart-badge"
                          {% if not favorites_count or favorites_count == 0 %}style="display:none"{% endif %}>
                        {{ favorites_count }}
                    </span>
                </a>
                <a href="{% url 'profile' %}" class="nav-link nav-icon" title="{{ request.user.email }}">
                    <svg width="22" height="22" viewBox="0 0 24 24" fill="none"
                         stroke="currentColor" stroke-width="1.8"
                         stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="12" cy="8" r="4"/>
                        <path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/>
                    </svg>
                </a>
            {% else %}
                <a href="{% url 'login' %}" class="nav-link">Увійти</a>
                <a href="{% url 'register' %}" class="nav-link">Реєстрація</a>
            {% endif %}

            <a href="{% url 'cart_detail' %}" class="cart-link">
                🛒
                <span id="cart-count" class="cart-badge"
                      {% if not cart or cart|length == 0 %}style="display:none"{% endif %}>
                    {{ cart|length }}
                </span>
            </a>
        </div>
    </nav>

    <div class="container">
        {% block content %}{% endblock %}
    </div>

    <script src="{% static 'store/js/cart.js' %}"></script>
</body>
</html>
