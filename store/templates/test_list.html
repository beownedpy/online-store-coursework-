{% extends 'base.html' %}
{% block content %}
    {% for item in items %}
        <div class="card">
            <h2>{{ item.title }}</h2>
            <p>gender: {{ item.gender }}</p>
            <p>Tags:</p>
            <ul>
                {% for tag in item.tags %}
                    <li>{{ tag }}</li>
                {% endfor %}
            </ul>
            {% if item.image %}
                <img src="{{ item.image.url }}" alt="image">
            {% endif %}
        </div>
    {% endfor %}
{% endblock %}
